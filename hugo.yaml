baseURL: "https://mmmonowar.github.io/eveningrain/"
languageCode: "en"
title: "Evening Rain"
paginate: 20

# Content directory (relative to eveningrain/)
contentDir: "../eveningrain-contents/10 Posts"

# Permalinks
permalinks:
  posts: "/:slug/"

# Taxonomies
taxonomies:
  tag: "tags"
  category: "categories"

# Output formats
outputFormats:
  SearchIndex:
    baseName: search
    isPlainText: true
    mediaType: application/json
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - SearchIndex

# Menu
menu:
  main:
    - name: Home
      url: "/"
      weight: 1
    - name: Tags
      url: "/tags/"
      weight: 2
    - name: Search
      url: "/search/"
      weight: 3
    - name: RSS
      url: "/index.xml"
      weight: 4

# Build all content regardless of date
buildFuture: true

# Page bundles support
enableRobotsTXT: true

params:
  author: "Muhammad Mustafa Monowar"
