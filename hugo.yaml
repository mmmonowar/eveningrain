baseURL: "https://mmmonowar.github.io/eveningrain/"
languageCode: "en"
title: "Evening Rain"
paginate: 20

# Content directory (relative to eveningrain/)
contentDir: "../eveningrain-contents/10 Posts"

# Permalinks
permalinks:
  posts: "/:slug/"

# Taxonomies
taxonomies:
  tag: "tags"
  category: "categories"

# Menu
menu:
  main:
    - name: Home
      url: "/"
      weight: 1
    - name: Tags
      url: "/tags/"
      weight: 2

# Page bundles support
enableRobotsTXT: true

params:
  author: "Muhammad Mustafa Monowar"
