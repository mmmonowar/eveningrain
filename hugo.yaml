baseURL: "https://mmmonowar.github.io/eveningrain/"
languageCode: "en"
title: "Evening Rain"
paginate: 20

# Content mounts (maps external content repo into Hugo sections)
module:
  mounts:
    - source: content/search
      target: content/search
    - source: ../eveningrain-contents/10 Posts
      target: content/posts

# Permalinks
permalinks:
  posts: "/:slug/"

# Taxonomies
taxonomies:
  tag: "tags"
  category: "categories"

# Frontmatter mapping: published → date
frontmatter:
  date:
    - published
    - date

# Output formats
outputFormats:
  SearchIndex:
    baseName: search
    isPlainText: true
    mediaType: application/json
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - SearchIndex

# Menu
menu:
  main:
    - name: Home
      url: "/"
      weight: 1
    - name: Tags
      url: "/tags/"
      weight: 2
    - name: Search
      url: "/search/"
      weight: 3
    - name: RSS
      url: "/index.xml"
      weight: 4

# Build all content regardless of date
buildFuture: true

# Page bundles support
enableRobotsTXT: true

params:
  author: "Muhammad Mustafa Monowar"
