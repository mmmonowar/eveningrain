{{ define "main" }}
<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ .Title }}</h1>
        <div class="post-meta">
            <time>{{ .Params.published }}</time>
            <span class="reading-time">{{ .ReadingTime }} min read</span>
        </div>
        {{ with .Params.author }}<span class="post-author">{{ . }}</span>{{ end }}
    </header>

    <div class="post-content">
        {{ .Content }}
    </div>

    {{ with .Params.tags }}
    <footer class="post-tags">
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
    </footer>
    {{ end }}

    <nav class="post-nav">
        {{ with .Prev }}<a class="prev" href="{{ .Permalink }}">{{ .Title }}</a>{{ end }}
        {{ with .Next }}<a class="next" href="{{ .Permalink }}">{{ .Title }}</a>{{ end }}
    </nav>
</article>
{{ end }}
