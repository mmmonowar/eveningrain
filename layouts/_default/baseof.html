<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

    <!-- CSS placeholder — FEAT-06 will create static/css/style.css -->
    <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">

    {{ block "head" . }}{{ end }}
</head>
<body>
    <header>
        <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>{{ .Site.Params.copyright }}</footer>

    {{ block "scripts" . }}{{ end }}
</body>
</html>
