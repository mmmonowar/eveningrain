<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:light)").matches?"light":"dark"}document.documentElement.setAttribute("data-theme",t);})();</script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
    <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "/index.xml" | absURL }}">

    {{ block "head" . }}{{ end }}
</head>
<body>
    <header class="site-header">
        <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
        <div class="search-container" data-search-index="{{ "search.json" | absURL }}">
            <input type="search" id="search-input" class="search-input" placeholder="Search posts...">
            <div id="search-results" class="search-results"></div>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    </header>

    <nav class="site-nav">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
    </nav>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>{{ .Site.Params.copyright }}</footer>

    <script src="{{ "js/theme.js" | absURL }}"></script>
    <script src="{{ "js/search.js" | absURL }}"></script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
